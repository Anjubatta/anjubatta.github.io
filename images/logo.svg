<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 54" width="210" height="54" role="img" aria-label="Anju Batta Logo">
  <!-- Icon mark: teal rounded square -->
  <rect x="0" y="0" width="54" height="54" rx="13" fill="#009688"/>

  <!-- Decorative code hint top-left -->
  <text x="6" y="14" font-family="'Courier New',Courier,monospace" font-size="9" font-weight="700" fill="rgba(255,255,255,0.45)">&lt;/&gt;</text>

  <!-- AB monogram -->
  <text x="5" y="40" font-family="'Courier New',Courier,monospace" font-size="24" font-weight="900" fill="#ffffff" letter-spacing="2">AB</text>

  <!-- Orange bottom accent bar -->
  <rect x="5" y="46" width="44" height="3.5" rx="1.75" fill="#F96D00"/>

  <!-- Wordmark: Anju -->
  <text x="68" y="23" font-family="Arial Black,Arial,sans-serif" font-size="18" font-weight="900" fill="#ffffff" letter-spacing="-0.3">Anju</text>

  <!-- Wordmark: Batta with orange period -->
  <text x="68" y="46" font-family="Arial Black,Arial,sans-serif" font-size="18" font-weight="900" fill="#009688" letter-spacing="-0.3">Batta<tspan fill="#F96D00">.</tspan></text>
</svg>
